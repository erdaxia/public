<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ .Site.Title }}</title>
</head>
<body>
    <header>
        <h1>{{ .Site.Title }}</h1>
    </header>
    <main>
        <ul>
            {{ range where .Site.RegularPages "Section" "posts" }}
            <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
            {{ end }}
        </ul>
    </main>
    <footer>
        <p>&copy; 2026</p>
    </footer>
</body>
</html>
